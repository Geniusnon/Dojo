<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LCB1 HAZARD HUNTER - LANDSCAPE LOCK</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Itim&display=swap" rel="stylesheet">
    <style>
        :root { --yellow: #ffde03; --blue: #0336ff; --red: #ff0266; --black: #000; --white: #fff; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100svh; 
            font-family: 'Itim', cursive; overflow: hidden; position: fixed; 
            background-color: #1a1a1a;
            background-image: repeating-linear-gradient(45deg, rgba(255,222,3,0.05) 0px, rgba(255,222,3,0.05) 2px, transparent 2px, transparent 10px);
        }

        /* --- [จุดสำคัญ] ตัวเตือนหมุนหน้าจอ: บังทุกอย่างเมื่อเครื่องเป็นแนวตั้ง --- */
        #rotate-warning {
            position: fixed; inset: 0; 
            background: var(--blue); color: var(--white); 
            z-index: 200000; /* สูงที่สุดในโลก */
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }

        /* ใช้ CSS ตรวจสอบ Orientation */
        @media screen and (orientation: portrait) {
            #rotate-warning { display: flex !important; }
            #game-interface, .screen, #mascot-ui, #sound-toggle { display: none !important; }
        }

        /* --- Mascot: ใหญ่และอยู่ขวาบน --- */
        #mascot-ui { 
            position: fixed; top: 5px; right: 15px; 
            width: 130px; height: auto; z-index: 5000; 
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.5));
        }

        /* --- UI Screens --- */
        .screen { 
            position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 1000; background: var(--yellow);
            clip-path: polygon(0 0, 100% 1%, 100% 100%, 0 99%);
        }
        .active-screen { display: flex; }
        
        .comic-title { 
            font-family: 'Bangers'; font-size: 12vh; color: var(--blue); 
            text-shadow: 4px 4px 0px #fff, 8px 8px 0px var(--black); 
            margin-bottom: 2vh; transform: rotate(-2deg);
        }
        
        .box { 
            background: var(--white); padding: 20px; border: 4px solid var(--black); 
            box-shadow: 8px 8px 0px var(--black); width: 90%; max-width: 500px; 
            text-align: center; position: relative; border-radius: 5px; outline: 5px solid var(--white);
        }

        #game-over-screen .box { display: flex; flex-direction: row; align-items: center; justify-content: space-around; max-width: 600px; padding: 25px; }
        .go-content { flex: 1; text-align: center; }
        .go-actions { flex: 1; display: flex; flex-direction: column; gap: 10px; }

        input { width: 100%; padding: 10px; margin: 5px 0; border: 3px solid var(--black); font-size: 18px; font-family: 'Itim'; outline: none; text-align: center; border-radius: 5px; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 10px; width: 100%; }
        .btn { 
            flex: 1; background: var(--red); color: var(--white); padding: 12px; 
            font-family: 'Bangers'; font-size: 24px; border: 4px solid var(--black); 
            cursor: pointer; box-shadow: 4px 4px 0px var(--black); text-align: center; 
            border-radius: 5px; text-decoration: none; transition: 0.1s;
        }
        .btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px var(--black); }
        .btn-blue { background: var(--blue); }

        /* Sound Toggle (ล่างซ้าย) */
        #sound-toggle {
            position: fixed; bottom: 15px; left: 15px; 
            width: 70px; height: 55px;
            background: var(--red); color: var(--white);
            border: 4px solid var(--black); border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            z-index: 9000; cursor: pointer;
            font-family: 'Bangers'; font-size: 24px;
            box-shadow: 4px 4px 0px var(--black);
            outline: 4px solid var(--white);
        }

        /* --- Game Interface --- */
        #game-interface { display: none; width: 100%; height: 100%; position: relative; z-index: 1500; }
        #viewport { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; overflow-x: auto; overflow-y: hidden; z-index: 1510; }
        .image-container { 
            position: relative; height: 96%; border: 8px solid var(--black);
            box-shadow: 0 0 30px rgba(0,0,0,0.7); outline: 8px solid var(--white);
        }
        #main-img { height: 100%; width: auto; display: block; object-fit: contain; }

        .side-bar-left { position: absolute; top: 10px; left: 10px; background: var(--white); border: 3px solid var(--black); border-radius: 5px; display: flex; padding: 5px 15px; gap: 20px; z-index: 1520; box-shadow: 4px 4px 0px var(--black); }
        .side-item { font-family: 'Bangers'; font-size: 16px; color: #000; }
        .side-item span { font-size: 20px; color: var(--blue); margin-left: 5px; }

        #character-area { position: absolute; bottom: 0; right: 0; width: 100px; z-index: 1520; pointer-events: none; }
        .big-char { width: 100%; height: auto; filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.3)); }

        /* พิกัดวงกลมจิ้ม */
        .hazard { position: absolute; width: 12vh; height: 12vh; transform: translate(-50%, -50%); z-index: 100; border-radius: 50%; border: 4px solid #ff0000; background: rgba(255, 0, 0, 0.2); }
        .hazard.found { border: 6px solid #00ff00 !important; background: rgba(0, 255, 0, 0.4) !important; box-shadow: 0 0 20px #00ff00; }
        
        #loading-overlay { position: fixed; inset: 0; background: var(--yellow); z-index: 11000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .shake-effect { animation: shake 0.3s !important; }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>
    <audio id="snd-miss" src="https://assets.mixkit.co/active_storage/sfx/2021/2021-preview.mp3" preload="auto"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

    <div id="sound-toggle" onclick="toggleMute()">ON</div>
    <img id="mascot-ui" src="images/mascot.png" alt="Mascot">

    <div id="rotate-warning">
        <div style="font-size: 70px; animation: shake 2s infinite;">🔄</div>
        <h2 style="font-family:'Bangers'; font-size: 40px; margin: 15px 0;">PLEASE ROTATE!</h2>
        <h3 style="font-family:'Itim'; margin: 0;">กรุณาหมุนโทรศัพท์เป็นแนวนอนเพื่อเล่น</h3>
    </div>

    <div id="loading-overlay"><h2 style="font-family:'Bangers'">LOADING...</h2></div>

    <div id="lang-screen" class="screen active-screen">
        <div class="comic-title">HAZARD HUNTER</div>
        <div class="btn-row" style="width: 300px;">
            <div class="btn" onclick="playClick(); selectLang('th')">ไทย</div>
            <div class="btn btn-blue" onclick="playClick(); selectLang('en')">EN</div>
        </div>
    </div>

    <div id="login-screen" class="screen">
        <div class="box">
            <input type="text" id="empName" placeholder="">
            <input type="text" id="empID" placeholder="">
            <div class="btn-row">
                <div class="btn" onclick="playClick(); startGame()" id="start-btn">เริ่ม / START</div>
            </div>
        </div>
    </div>

    <div id="game-interface">
        <div id="viewport">
            <div class="image-container" id="img-box">
                <img id="main-img" src="">
                <div id="hazard-container"></div>
            </div>
        </div>
        <div class="side-bar-left">
            <div class="side-item">LV<span id="current-lv">1</span></div>
            <div class="side-item"><span id="ui-time">TIME</span><span id="timer" style="color:red">60</span></div>
            <div class="side-item"><span id="ui-score">SCORE</span><span id="total-score">0</span></div>
        </div>
        <div id="character-area"><img src="images/character.png" class="big-char"></div>
    </div>

    <div id="game-over-screen" class="screen">
        <div class="box">
            <div class="go-content">
                <h2 id="go-msg" style="font-family:'Bangers'; font-size: 35px; margin:0;"></h2>
                <div id="rank-display" style="font-family:'Bangers'; font-size: 22px; margin: 5px 0;"></div>
                <h1 id="go-score" style="font-size: 50px; color: var(--blue); font-family: 'Bangers'; margin: 0;">0</h1>
            </div>
            <div class="go-actions">
                <div class="btn" onclick="playClick(); location.reload()">HOME</div>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            th: { pl: "ชื่อพนักงาน", id: "รหัสพนักงาน", st: "เริ่มล่า", time: "เวลา", score: "แต้ม", win: "สำเร็จ!", lose: "เวลาหมด!", rank: "ฉายา: ", ranks: [{m:1800, t:"ปรมาจารย์ 👑"}, {m:1200, t:"นักล่า 🛡️"}, {m:600, t:"ฝึกหัด 🏹"}, {m:0, t:"น้องใหม่ 🔍"}]},
            en: { pl: "Name", id: "ID", st: "START", time: "TIME", score: "SCORE", win: "CLEAR!", lose: "TIMEOUT!", rank: "RANK: ", ranks: [{m:1800, t:"Master 👑"}, {m:1200, t:"Elite 🛡️"}, {m:600, t:"Junior 🏹"}, {m:0, t:"Rookie 🔍"}]}
        };

        const levelsData = [
            { img: "level1.jpg", points: [{t:89, l:38}, {t:88, l:53}, {t:17, l:65}, {t:66, l:50}] },
            { img: "level2.jpg", points: [{t:84, l:54}, {t:94, l:36}, {t:53, l:27}, {t:90, l:74}] },
            { img: "level3.jpg", points: [{t:36, l:83}, {t:62, l:69}, {t:89, l:79}, {t:81, l:36}] },
            { img: "level4.jpg", points: [{t:43, l:33}, {t:68, l:73}, {t:47, l:47}, {t:66, l:44}] },
            { img: "level5.jpg", points: [{t:73, l:96}, {t:54, l:55}, {t:37, l:55}, {t:59, l:99}] }
        ];

        let currentLang = 'th', currentLevel = 1, totalScore = 0, timeLeft = 60, foundInLevel = 0, timerObj, isPlaying = false, isMuted = false;

        function playClick() { if(!isMuted) { const s = document.getElementById('snd-click'); s.currentTime = 0; s.play().catch(()=>{}); } }
        function toggleMute() { isMuted = !isMuted; const b = document.getElementById('sound-toggle'); b.innerText = isMuted ? "OFF" : "ON"; b.style.background = isMuted ? "#555" : "var(--red)"; playClick(); }

        function selectLang(l) {
            currentLang = l; const t = translations[l];
            document.getElementById('empName').placeholder = t.pl; document.getElementById('empID').placeholder = t.id;
            document.getElementById('start-btn').innerText = t.st; document.getElementById('ui-time').innerText = t.time; document.getElementById('ui-score').innerText = t.score;
            document.getElementById('lang-screen').classList.remove('active-screen'); document.getElementById('login-screen').classList.add('active-screen');
        }

        function startGame() {
            if(!document.getElementById('empName').value || !document.getElementById('empID').value) return alert("กรุณากรอกข้อมูล");
            document.getElementById('login-screen').classList.remove('active-screen');
            document.getElementById('mascot-ui').style.display = 'none'; 
            document.getElementById('game-interface').style.display = 'block';
            loadLevel(1); startTimer();
        }

        function loadLevel(lv) {
            isPlaying = false; document.getElementById('loading-overlay').style.display = 'flex';
            const container = document.getElementById('hazard-container'); container.innerHTML = '';
            const img = document.getElementById('main-img');
            img.src = `images/${levelsData[lv-1].img}?v=${Date.now()}`;
            img.onload = () => {
                document.getElementById('img-box').style.width = img.clientWidth + "px";
                levelsData[lv-1].points.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'hazard'; div.style.top = p.t + '%'; div.style.left = p.l + '%';
                    div.onclick = (e) => { e.stopPropagation(); if(!isPlaying || div.classList.contains('found')) return;
                        if(!isMuted) document.getElementById('snd-hit').play();
                        div.classList.add('found'); foundInLevel++;
                        if(foundInLevel === 4) { 
                            totalScore += (timeLeft * 10); 
                            document.getElementById('total-score').innerText = totalScore;
                            if(currentLevel < 5) { setTimeout(()=>loadLevel(++currentLevel), 600); } else { gameOver(true); }
                        }
                    };
                    container.appendChild(div);
                });
                document.getElementById('loading-overlay').style.display = 'none';
                isPlaying = true; foundInLevel = 0; timeLeft = 60;
                document.getElementById('current-lv').innerText = lv;
            };
        }

        function startTimer() { if(timerObj) clearInterval(timerObj); timerObj = setInterval(() => { if(isPlaying) { timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft <= 0) gameOver(false); } }, 1000); }

        document.getElementById('viewport').onclick = (e) => {
            if(!isPlaying || e.target.classList.contains('hazard')) return;
            if(!isMuted) document.getElementById('snd-miss').play();
            timeLeft -= 10; if(timeLeft < 0) timeLeft = 0;
            document.getElementById('timer').innerText = timeLeft;
            const gi = document.getElementById('game-interface');
            gi.classList.add('shake-effect'); setTimeout(() => gi.classList.remove('shake-effect'), 300);
            if(timeLeft <= 0) gameOver(false);
        };

        function gameOver(win) {
            isPlaying = false; clearInterval(timerObj);
            if(win && !isMuted) document.getElementById('snd-win').play();
            document.getElementById('game-interface').style.display = 'none';
            document.getElementById('game-over-screen').classList.add('active-screen');
            const t = translations[currentLang];
            document.getElementById('go-msg').innerText = win ? t.win : t.lose;
            document.getElementById('go-score').innerText = totalScore;
            let fr = t.ranks.find(r => totalScore >= r.m);
            document.getElementById('rank-display').innerText = t.rank + fr.t;
        }

        const unlock = () => { if(!isMuted) document.getElementById('snd-click').play().catch(()=>{}); document.removeEventListener('click', unlock); document.removeEventListener('touchstart', unlock); };
        document.addEventListener('click', unlock); document.addEventListener('touchstart', unlock);
    </script>
</body>
</html>
