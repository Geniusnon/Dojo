<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LCB1 HAZARD HUNTER - FINAL PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Itim&display=swap" rel="stylesheet">
    <style>
        :root { --yellow: #ffde03; --blue: #0336ff; --red: #ff0266; --black: #000; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100svh; 
            background: var(--yellow); font-family: 'Itim', cursive; 
            overflow: hidden; position: fixed; 
        }

        /* --- Rotate Warning --- */
        #rotate-warning {
            position: fixed; inset: 0; background: var(--blue); color: white; z-index: 99999;
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        @media screen and (orientation: portrait) { #rotate-warning { display: flex !important; } }

        /* --- Screens --- */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: var(--yellow); }
        .active-screen { display: flex; }
        .comic-title { font-family: 'Bangers'; font-size: 7vh; color: var(--blue); text-shadow: 2px 2px 0px #fff, 3px 3px 0px var(--black); margin-bottom: 2vh; }
        
        .box { background: #fff; padding: 15px; border: 4px solid var(--black); box-shadow: 6px 6px 0px var(--black); width: 85%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 8px; margin: 4px 0; border: 2px solid var(--black); font-size: 16px; font-family: 'Itim'; text-align: center; outline: none; }
        
        .btn-row { display: flex; gap: 8px; margin-top: 8px; width: 100%; }
        .btn { flex: 1; background: var(--red); color: #fff; padding: 10px; font-family: 'Bangers'; font-size: 18px; border: 3px solid var(--black); cursor: pointer; box-shadow: 3px 3px 0px var(--black); text-align: center; text-decoration: none; }
        .btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px var(--black); }
        .btn-blue { background: var(--blue); }

        /* --- Game Interface --- */
        #game-interface { display: none; width: 100%; height: 100%; flex-direction: row; background: #222; z-index: 1500; }

        /* ฝั่งซ้าย (Stats) */
        .side-bar-left { width: 90px; background: #fff; border-right: 5px solid var(--black); display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 5px 0; z-index: 2000; }
        .side-item { text-align: center; font-family: 'Bangers'; font-size: 14px; line-height: 1; }
        .side-item span { display: block; font-size: 22px; color: var(--blue); margin-top: 4px; }
        .side-item.time span { color: var(--red); }

        /* ตรงกลาง (Viewport) */
        #viewport { flex: 1; position: relative; display: flex; justify-content: flex-start; align-items: center; overflow-x: auto; overflow-y: hidden; background: #000; -webkit-overflow-scrolling: touch; }
        .image-container { position: relative; height: 100%; display: flex; align-items: center; }
        #main-img { height: 100%; width: auto; display: block; }

        /* ฝั่งขวา (Character Area) */
        #character-area { 
            width: 130px; background: var(--yellow); border-left: 5px solid var(--black); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 2000; position: relative; padding: 5px;
        }

        /* Hazards & Effects */
        .hazard { position: absolute; width: 8vh; height: 8vh; transform: translate(-50%, -50%); z-index: 100; border-radius: 50%; border: 3px solid #ff0000; background: rgba(255, 0, 0, 0.2); }
        .hazard.found { border-color: #00ff00 !important; background: rgba(0, 255, 0, 0.3) !important; }
        .penalty-text { position: fixed; color: #ff0000; font-family: 'Bangers'; font-size: 40px; z-index: 9999; text-shadow: 2px 2px 0px #000; pointer-events: none; animation: fadeUp 0.8s forwards; }
        @keyframes fadeUp { 0% { opacity: 1; transform: translate(-50%, -50%); } 100% { opacity: 0; transform: translate(-50%, -150%); } }

        #loading-overlay { position: fixed; inset: 0; background: var(--yellow); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="rotate-warning">
        <div style="font-size: 60px;">🔄</div>
        <h2 style="font-family:'Bangers'">LANDSCAPE ONLY</h2>
        <p>กรุณาหมุนจอเป็นแนวนอน</p>
    </div>

    <div id="loading-overlay"><h2 style="font-family:'Bangers'">LOADING...</h2></div>

    <div id="lang-screen" class="screen active-screen">
        <div class="comic-title">HAZARD HUNTER</div>
        <div class="btn-row" style="width: 260px;">
            <div class="btn" onclick="selectLang('th')">ไทย</div>
            <div class="btn btn-blue" onclick="selectLang('en')">EN</div>
        </div>
    </div>

    <div id="login-screen" class="screen">
        <div class="box">
            <input type="text" id="empName" placeholder="ชื่อ / Name">
            <input type="text" id="empID" placeholder="รหัสพนักงาน / ID">
            <div class="btn-row">
                <div class="btn" onclick="startGame()" id="start-btn">START</div>
                <div class="btn btn-blue" onclick="showRules()" id="rule-btn">RULES</div>
            </div>
            <div class="btn-row">
                <div class="btn btn-blue" style="background:#666;" onclick="backToLang()">LANGUAGE</div>
            </div>
        </div>
    </div>

    <div id="rules-screen" class="screen">
        <div class="box">
            <div id="rule-text" style="font-size: 15px; margin-bottom: 15px; text-align: left;"></div>
            <div class="btn btn-blue" onclick="backToLogin()" id="back-btn">BACK</div>
        </div>
    </div>

    <div id="game-interface">
        <div class="side-bar-left">
            <div class="side-item">LV<span id="current-lv">1</span></div>
            <div class="side-item time">TIME<span id="timer">60</span></div>
            <div class="side-item">SCORE<span id="total-score">0</span></div>
        </div>
        
        <div id="viewport">
            <div class="image-container" id="img-box">
                <img id="main-img" src="">
                <div id="hazard-container"></div>
            </div>
        </div>

        <div id="character-area">
            <img src="images/character.png" alt="Character" style="max-width: 100%; height: auto; object-fit: contain;">
        </div>
    </div>

    <div id="game-over-screen" class="screen">
        <div class="box">
            <h2 id="go-msg" style="margin:0; font-family:'Bangers'; font-size: 30px;"></h2>
            <div style="font-size: 18px; margin-top: 10px;">TOTAL SCORE</div>
            <h1 id="go-score" style="font-size: 60px; color: var(--blue); font-family: 'Bangers'; margin: 5px 0;">0</h1>
            <div class="btn" onclick="location.reload()" style="max-width: 150px; margin: 10px auto 0;">HOME</div>
        </div>
    </div>

    <script>
        const langData = {
            th: { startBtn: "เริ่มภารกิจ", ruleBtn: "กติกา", ruleDesc: "• หาจุดอันตราย 4 จุดต่อภาพ<br>• หากจิ้มผิดหักเวลา 10 วินาที<br>• คะแนน = เวลาที่เหลือ x 10", backBtn: "ย้อนกลับ", alertLogin: "กรอกข้อมูลให้ครบ", goComplete: "สำเร็จ!", goTimeout: "เวลาหมด!" },
            en: { startBtn: "START", ruleBtn: "RULES", ruleDesc: "• Find 4 hazards per level<br>• Wrong tap: -10 sec penalty<br>• Score = Remaining time x 10", backBtn: "BACK", alertLogin: "Please fill info", goComplete: "MISSION CLEAR!", goTimeout: "TIME OUT!" }
        };

        const levelsData = [
            { img: "level1.jpg", points: [{t:89, l:38}, {t:88, l:53}, {t:17, l:65}, {t:66, l:50}] },
            { img: "level2.jpg", points: [{t:84, l:54}, {t:94, l:36}, {t:53, l:27}, {t:90, l:74}] },
            { img: "level3.jpg", points: [{t:36, l:83}, {t:62, l:69}, {t:89, l:79}, {t:81, l:36}] },
            { img: "level4.jpg", points: [{t:43, l:33}, {t:68, l:73}, {t:47, l:47}, {t:66, l:44}] },
            { img: "level5.jpg", points: [{t:73, l:96}, {t:54, l:55}, {t:37, l:55}, {t:59, l:99}] }
        ];

        let currentLang = 'th', currentLevel = 1, totalScore = 0, timeLeft = 60, foundInLevel = 0, timerObj, isPlaying = false;

        function selectLang(l) { 
            currentLang = l; 
            updateTexts(); 
            document.getElementById('lang-screen').classList.remove('active-screen'); 
            document.getElementById('login-screen').classList.add('active-screen'); 
        }

        // ฟังก์ชันกลับหน้าเลือกภาษา
        function backToLang() {
            document.getElementById('login-screen').classList.remove('active-screen');
            document.getElementById('lang-screen').classList.add('active-screen');
        }

        function updateTexts() {
            const d = langData[currentLang];
            document.getElementById('start-btn').innerText = d.startBtn;
            document.getElementById('rule-btn').innerText = d.ruleBtn;
            document.getElementById('rule-text').innerHTML = d.ruleDesc;
            document.getElementById('back-btn').innerText = d.backBtn;
        }

        function showRules() { document.getElementById('login-screen').classList.remove('active-screen'); document.getElementById('rules-screen').classList.add('active-screen'); }
        function backToLogin() { document.getElementById('rules-screen').classList.remove('active-screen'); document.getElementById('login-screen').classList.add('active-screen'); }

        function startGame() {
            if(!document.getElementById('empName').value) return alert(langData[currentLang].alertLogin);
            document.getElementById('login-screen').classList.remove('active-screen');
            document.getElementById('game-interface').style.display = 'flex';
            loadLevel(1); 
            startTimer();
        }

        function loadLevel(lv) {
            isPlaying = false;
            document.getElementById('loading-overlay').style.display = 'flex';
            const container = document.getElementById('hazard-container');
            container.innerHTML = '';
            const img = document.getElementById('main-img');
            img.style.opacity = '0';
            
            setTimeout(() => {
                img.src = `images/${levelsData[lv-1].img}?v=${Date.now()}`;
                img.onload = () => {
                    img.style.opacity = '1';
                    const imgBox = document.getElementById('img-box');
                    imgBox.style.width = img.clientWidth + "px";
                    imgBox.style.height = img.clientHeight + "px";
                    createHazards(lv);
                    document.getElementById('loading-overlay').style.display = 'none';
                    isPlaying = true; 
                    foundInLevel = 0; 
                    currentLevel = lv;
                    document.getElementById('current-lv').innerText = lv;
                    document.getElementById('viewport').scrollLeft = 0;
                };
            }, 400);
        }

        function createHazards(lv) {
            const container = document.getElementById('hazard-container');
            levelsData[lv-1].points.forEach(p => {
                const div = document.createElement('div');
                div.className = 'hazard';
                div.style.top = p.t + '%'; div.style.left = p.l + '%';
                div.addEventListener('touchstart', (e) => { e.preventDefault(); handleHit(div); }, {passive: false});
                div.onclick = (e) => { e.stopPropagation(); handleHit(div); };
                container.appendChild(div);
            });
        }

        function handleHit(div) {
            if(!isPlaying || div.classList.contains('found')) return;
            div.classList.add('found'); 
            foundInLevel++;
            if(foundInLevel === 4) {
                totalScore += (timeLeft * 10);
                document.getElementById('total-score').innerText = totalScore;
                if(currentLevel < 5) { 
                    setTimeout(() => { timeLeft = 60; loadLevel(currentLevel + 1); }, 600); 
                } else { 
                    gameOver(true); 
                }
            }
        }

        // --- ระบบหักเวลาเมื่อจิ้มผิด (คงไว้แน่นอน) ---
        document.getElementById('viewport').addEventListener('touchstart', (e) => {
            if(!isPlaying || e.target.classList.contains('hazard')) return;
            const touch = e.touches[0];
            
            timeLeft -= 10; 
            if(timeLeft < 0) timeLeft = 0;
            document.getElementById('timer').innerText = timeLeft;

            const p = document.createElement('div');
            p.className = 'penalty-text'; p.innerText = '-10s';
            p.style.left = touch.clientX + 'px'; p.style.top = touch.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            
            if(timeLeft <= 0) gameOver(false);
        }, {passive: false});

        function startTimer() {
            if(timerObj) clearInterval(timerObj);
            timerObj = setInterval(() => { 
                if(isPlaying) { 
                    timeLeft--; 
                    document.getElementById('timer').innerText = timeLeft; 
                    if(timeLeft <= 0) gameOver(false); 
                } 
            }, 1000);
        }

        function gameOver(win) {
            isPlaying = false; 
            clearInterval(timerObj);
            document.getElementById('game-interface').style.display = 'none';
            document.getElementById('game-over-screen').classList.add('active-screen');
            document.getElementById('go-msg').innerText = win ? langData[currentLang].goComplete : langData[currentLang].goTimeout;
            document.getElementById('go-score').innerText = totalScore;
        }
    </script>
</body>
</html>
