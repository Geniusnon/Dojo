<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LCB1 HAZARD HUNTER - FULL RECOVERY</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Itim&display=swap" rel="stylesheet">
    <style>
        :root { --yellow: #ffde03; --blue: #0336ff; --red: #ff0266; --black: #000; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100svh; 
            background: var(--black); font-family: 'Itim', cursive; 
            overflow: hidden; position: fixed; 
        }

        /* --- Mascot: นิ่งถาวรที่มุมขวาบน ไม่บังหน้าจอ --- */
        .mascot-fixed { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            width: 80px; 
            height: auto; 
            z-index: 5000; 
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.3));
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .shake-effect { animation: shake 0.3s !important; }

        /* --- Rotate Warning --- */
        #rotate-warning {
            position: fixed; inset: 0; background: var(--blue); color: white; z-index: 99999;
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        @media screen and (orientation: portrait) { #rotate-warning { display: flex !important; } }

        /* --- UI Screens --- */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: var(--yellow); }
        .active-screen { display: flex; }
        
        .comic-title { 
            font-family: 'Bangers'; font-size: 8vh; color: var(--blue); 
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px var(--black); 
            margin-bottom: 4vh; 
        }
        
        .box { background: #fff; padding: 25px; border: 4px solid var(--black); box-shadow: 6px 6px 0px var(--black); width: 85%; max-width: 400px; text-align: center; position: relative; border-radius: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 3px solid var(--black); font-size: 18px; font-family: 'Itim'; outline: none; text-align: center; border-radius: 10px; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 15px; width: 100%; }
        .btn { flex: 1; background: var(--red); color: #fff; padding: 15px; font-family: 'Bangers'; font-size: 22px; border: 3px solid var(--black); cursor: pointer; box-shadow: 3px 3px 0px var(--black); text-align: center; border-radius: 12px; }
        .btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px var(--black); }
        .btn-blue { background: var(--blue); }

        /* Sound Toggle (ล่างซ้าย) */
        #sound-toggle {
            position: fixed; bottom: 20px; left: 20px; 
            width: 70px; height: 60px;
            background: var(--red); color: white;
            border: 4px solid var(--black); border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            z-index: 9000; cursor: pointer;
            font-family: 'Bangers'; font-size: 26px;
            box-shadow: 4px 4px 0px var(--black);
        }

        /* --- วงกลมแดง (มองเห็นเพื่อให้ปรับพิกัดง่าย) --- */
        .hazard { 
            position: absolute; width: 12vh; height: 12vh; 
            transform: translate(-50%, -50%); z-index: 100; border-radius: 50%; 
            border: 3px solid #ff0000; background: rgba(255, 0, 0, 0.2); 
        }
        .hazard.found { 
            border: 5px solid #00ff00 !important; 
            background: rgba(0, 255, 0, 0.4) !important; 
            box-shadow: 0 0 15px #00ff00;
        }

        /* --- Game Interface --- */
        #game-interface { display: none; width: 100%; height: 100%; position: relative; background: var(--black); z-index: 1500; }
        #viewport { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; overflow-x: auto; overflow-y: hidden; z-index: 1510; }
        .image-container { position: relative; height: 100%; display: flex; align-items: center; }
        #main-img { height: 100%; width: auto; display: block; }
        .side-bar-left { position: absolute; top: 10px; left: 10px; background: rgba(255, 255, 255, 0.9); border: 3px solid var(--black); border-radius: 10px; display: flex; padding: 5px 15px; gap: 20px; z-index: 1520; }
        .side-item { font-family: 'Bangers'; font-size: 16px; color: #000; }
        .side-item span { font-size: 20px; color: var(--blue); margin-left: 5px; }
        #character-area { position: absolute; bottom: 0; right: 0; width: 120px; z-index: 1520; pointer-events: none; }
        .big-char { width: 100%; height: auto; }
        #loading-overlay { position: fixed; inset: 0; background: var(--yellow); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <audio id="bgm" loop preload="auto"><source src="https://assets.mixkit.co/music/preview/mixkit-mystery-suspense-132.mp3" type="audio/mpeg"></audio>
    <audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>
    <audio id="snd-miss" src="https://assets.mixkit.co/active_storage/sfx/2021/2021-preview.mp3" preload="auto"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

    <img id="mascot-ui" src="images/mascot.png" class="mascot-fixed" alt="Mascot">

    <div id="sound-toggle" onclick="toggleMute()">ON</div>

    <div id="rotate-warning">
        <h2 style="font-family:'Bangers'">LANDSCAPE ONLY</h2>
        <h3 style="font-family:'Itim'">หมุนหน้าจอเป็นแนวนอนเพื่อเล่น</h3>
    </div>

    <div id="loading-overlay"><h2 style="font-family:'Bangers'">LOADING...</h2></div>

    <div id="lang-screen" class="screen active-screen">
        <div class="comic-title">HAZARD HUNTER</div>
        <div class="btn-row" style="width: 280px;">
            <div class="btn" onclick="selectLang('th')">ไทย</div>
            <div class="btn btn-blue" onclick="selectLang('en')">EN</div>
        </div>
    </div>

    <div id="login-screen" class="screen">
        <div class="box">
            <input type="text" id="empName" placeholder="">
            <input type="text" id="empID" placeholder="">
            <div class="btn-row">
                <div class="btn" onclick="startGame()" id="start-btn">เริ่ม / START</div>
            </div>
        </div>
    </div>

    <div id="game-interface">
        <div id="viewport">
            <div class="image-container" id="img-box">
                <img id="main-img" src="">
                <div id="hazard-container"></div>
            </div>
        </div>
        <div class="side-bar-left">
            <div class="side-item">LV<span id="current-lv">1</span></div>
            <div class="side-item">TIME<span id="timer" style="color:red">60</span></div>
            <div class="side-item">SCORE<span id="total-score">0</span></div>
        </div>
        <div id="character-area"><img src="images/character.png" class="big-char"></div>
    </div>

    <div id="game-over-screen" class="screen">
        <div class="box">
            <h2 id="go-msg" style="font-family:'Bangers'; font-size: 35px; margin:0;"></h2>
            <div id="rank-display" style="font-family:'Bangers'; font-size: 24px; margin: 15px 0;"></div>
            <h1 id="go-score" style="font-size: 65px; color: var(--blue); font-family: 'Bangers'; margin: 5px 0;">0</h1>
            <div class="btn" onclick="location.reload()">หน้าแรก / HOME</div>
        </div>
    </div>

    <script>
        const translations = {
            th: { pl: "ชื่อพนักงาน", id: "รหัสพนักงาน", st: "เริ่มล่า", win: "สำเร็จ!", lose: "เวลาหมด!", rank: "ฉายา: ", ranks: [{m:1800, t:"ปรมาจารย์ความปลอดภัย 👑"}, {m:1200, t:"นักล่าอันตรายขั้นสูง 🛡️"}, {m:600, t:"นักล่าอันตรายชั้นต้น 🏹"}, {m:0, t:"นักล่าอันตรายฝึกหัด 🔍"}]},
            en: { pl: "Employee Name", id: "Employee ID", st: "START", win: "MISSION CLEAR!", lose: "TIME OUT!", rank: "RANK: ", ranks: [{m:1800, t:"Safety Master 👑"}, {m:1200, t:"Elite Hunter 🛡️"}, {m:600, t:"Junior Hunter 🏹"}, {m:0, t:"Trainee Hunter 🔍"}]}
        };

        const levelsData = [
            { img: "level1.jpg", points: [{t:89, l:38}, {t:88, l:53}, {t:17, l:65}, {t:66, l:50}] },
            { img: "level2.jpg", points: [{t:84, l:54}, {t:94, l:36}, {t:53, l:27}, {t:90, l:74}] },
            { img: "level3.jpg", points: [{t:36, l:83}, {t:62, l:69}, {t:89, l:79}, {t:81, l:36}] },
            { img: "level4.jpg", points: [{t:43, l:33}, {t:68, l:73}, {t:47, l:47}, {t:66, l:44}] },
            { img: "level5.jpg", points: [{t:73, l:96}, {t:54, l:55}, {t:37, l:55}, {t:59, l:99}] }
        ];

        let currentLang = 'th', currentLevel = 1, totalScore = 0, timeLeft = 60, foundInLevel = 0, timerObj, isPlaying = false, isMuted = false;
        const bgm = document.getElementById('bgm');

        function selectLang(l) {
            currentLang = l;
            document.getElementById('empName').placeholder = translations[l].pl;
            document.getElementById('empID').placeholder = translations[l].id;
            document.getElementById('start-btn').innerText = translations[l].st;
            bgm.volume = 0.3; bgm.play().catch(()=>{});
            document.getElementById('lang-screen').classList.remove('active-screen');
            document.getElementById('login-screen').classList.add('active-screen');
        }

        function toggleMute() {
            isMuted = !isMuted; bgm.muted = isMuted;
            document.getElementById('sound-toggle').innerText = isMuted ? "OFF" : "ON";
            document.getElementById('sound-toggle').style.background = isMuted ? "#555" : "var(--red)";
        }

        function startGame() {
            if(!document.getElementById('empName').value || !document.getElementById('empID').value) return alert("กรุณากรอกข้อมูล");
            document.getElementById('login-screen').classList.remove('active-screen');
            document.getElementById('mascot-ui').style.display = 'none'; 
            document.getElementById('game-interface').style.display = 'block';
            loadLevel(1); startTimer();
        }

        function loadLevel(lv) {
            isPlaying = false; document.getElementById('loading-overlay').style.display = 'flex';
            const container = document.getElementById('hazard-container'); container.innerHTML = '';
            const img = document.getElementById('main-img');
            img.src = `images/${levelsData[lv-1].img}?v=${Date.now()}`;
            img.onload = () => {
                document.getElementById('img-box').style.width = img.clientWidth + "px";
                levelsData[lv-1].points.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'hazard'; div.style.top = p.t + '%'; div.style.left = p.l + '%';
                    div.onclick = (e) => { e.stopPropagation(); if(!isPlaying || div.classList.contains('found')) return;
                        if(!isMuted) document.getElementById('snd-hit').play();
                        div.classList.add('found'); foundInLevel++;
                        if(foundInLevel === 4) { 
                            totalScore += (timeLeft * 10); 
                            document.getElementById('total-score').innerText = totalScore;
                            if(currentLevel < 5) { setTimeout(()=>loadLevel(++currentLevel), 600); } else { gameOver(true); }
                        }
                    };
                    container.appendChild(div);
                });
                document.getElementById('loading-overlay').style.display = 'none';
                isPlaying = true; foundInLevel = 0; timeLeft = 60;
                document.getElementById('current-lv').innerText = lv;
                document.getElementById('viewport').scrollLeft = 0;
            };
        }

        function startTimer() {
            if(timerObj) clearInterval(timerObj);
            timerObj = setInterval(() => { if(isPlaying) { timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft <= 0) gameOver(false); } }, 1000);
        }

        document.getElementById('viewport').onclick = (e) => {
            if(!isPlaying || e.target.classList.contains('hazard')) return;
            if(!isMuted) document.getElementById('snd-miss').play();
            timeLeft -= 10; if(timeLeft < 0) timeLeft = 0;
            document.getElementById('timer').innerText = timeLeft;
            const gi = document.getElementById('game-interface');
            gi.classList.add('shake-effect'); setTimeout(() => gi.classList.remove('shake-effect'), 300);
            if(timeLeft <= 0) gameOver(false);
        };

        function gameOver(win) {
            isPlaying = false; clearInterval(timerObj);
            if(win && !isMuted) document.getElementById('snd-win').play();
            document.getElementById('game-interface').style.display = 'none';
            document.getElementById('game-over-screen').classList.add('active-screen');
            const t = translations[currentLang];
            document.getElementById('go-msg').innerText = win ? t.win : t.lose;
            document.getElementById('go-score').innerText = totalScore;
            let fr = t.ranks.find(r => totalScore >= r.m);
            document.getElementById('rank-display').innerText = t.rank + fr.t;
        }

        const unlockAudio = () => { if(bgm.paused && !isMuted) bgm.play(); document.removeEventListener('click', unlockAudio); document.removeEventListener('touchstart', unlockAudio); };
        document.addEventListener('click', unlockAudio);
        document.addEventListener('touchstart', unlockAudio);
    </script>
</body>
</html>
