<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LCB1 HAZARD HUNTER</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Itim&display=swap" rel="stylesheet">
    <style>
        :root { --yellow: #ffde03; --blue: #0336ff; --red: #ff0266; --black: #000; --white: #fff; --green: #00e676; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100svh; 
            font-family: 'Itim', cursive; overflow: hidden; position: fixed; 
            background-color: #1a1a1a;
        }

        /* --- [ปรับแก้] Rotate Warning จากไอคอนหมุนเป็นรูปมือถือเอียง --- */
        #rotate-warning { 
            position: fixed; inset: 0; background: var(--blue); color: var(--white); z-index: 200000; 
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
            padding: 20px;
        }
        
        /* สร้างอนิเมชั่นรูปมือถือเอียง */
        .phone-icon-anim {
            width: 45px; height: 80px;
            border: 3px solid var(--white);
            border-radius: 6px;
            position: relative;
            margin-bottom: 20px;
            animation: rotateLandscape 2s ease-in-out infinite;
        }
        .phone-icon-anim::after {
            content: '';
            position: absolute; bottom: 5px; left: 50%;
            transform: translateX(-50%);
            width: 6px; height: 6px;
            background: var(--white);
            border-radius: 50%;
        }
        @keyframes rotateLandscape {
            0%, 20% { transform: rotate(0deg); }
            50%, 80% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        @media screen and (orientation: portrait) { 
            #rotate-warning { display: flex !important; } 
            #game-interface, .screen, #sound-toggle { display: none !important; } 
        }

        /* --- Sound Toggle --- */
        #sound-toggle { position: fixed; bottom: 10px; left: 10px; width: 50px; height: 35px; background: var(--red); color: var(--white); border: 2px solid var(--black); border-radius: 8px; display: flex; justify-content: center; align-items: center; z-index: 9000; cursor: pointer; font-family: 'Bangers'; font-size: 16px; box-shadow: 2px 2px 0px var(--black); outline: 2px solid var(--white); }

        /* --- UI Screens --- */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: var(--yellow); clip-path: polygon(0 0, 100% 1%, 100% 100%, 0 99%); padding: 10px; }
        .active-screen { display: flex; }
        
        #lang-screen { justify-content: center; }
        .main-mascot { width: auto; height: 25vh; max-height: 120px; margin-bottom: 10px; filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1)); }
        .comic-title { font-family: 'Bangers'; font-size: 8vh; max-font-size: 60px; color: var(--blue); text-shadow: 2px 2px 0px #fff, 4px 4px 0px var(--black); margin-bottom: 10px; transform: rotate(-1deg); line-height: 1; }
        
        .box { 
            background: var(--white); 
            padding: 15px; 
            border: 3px solid var(--black); 
            box-shadow: 5px 5px 0px var(--black); 
            width: 90%; 
            max-width: 420px; 
            max-height: 90vh; 
            overflow-y: auto; 
            text-align: center; 
            position: relative; 
            border-radius: 5px; 
            outline: 4px solid var(--white);
        }

        input { width: 100%; padding: 8px; margin: 5px 0; border: 2px solid var(--black); font-family: 'Itim'; font-size: 16px; border-radius: 5px; }
        .btn-row { display: flex; gap: 8px; margin-top: 10px; width: 100%; justify-content: center; }
        .btn { display: inline-block; width: 100%; background: var(--red); color: var(--white); padding: 10px; font-family: 'Bangers'; font-size: 20px; border: 3px solid var(--black); cursor: pointer; box-shadow: 3px 3px 0px var(--black); text-align: center; border-radius: 5px; text-decoration: none; }
        .btn:active { transform: translate(1.5px, 1.5px); box-shadow: 1px 1px 0px var(--black); }

        /* --- Leaderboard UI --- */
        #rank-screen { 
            background: var(--blue); 
            padding: 5px; 
        }

        .leaderboard-container { 
            background: var(--white); 
            border: 3px solid var(--black); 
            width: 98%; 
            max-width: 500px; 
            height: 96vh; 
            max-height: 310px; 
            padding: 8px; 
            border-radius: 10px; 
            box-shadow: 4px 4px 0px var(--black); 
            display: flex; 
            flex-direction: column;
        }

        .rank-header { 
            font-family: 'Bangers'; 
            font-size: 20px; 
            color: var(--blue); 
            margin: 0 0 5px 0; 
            text-align: center; 
        }

        .rank-list { 
            flex: 1; 
            overflow-y: auto; 
            border: 2px solid var(--black); 
            margin-bottom: 5px; 
            background: #eee; 
        }

        .rank-item { 
            display: grid; 
            grid-template-columns: 1.2fr 1fr 0.6fr; 
            gap: 4px; 
            padding: 4px 6px; 
            border-bottom: 1px solid #ccc; 
            font-size: 13px; 
            align-items: center; 
        }

        .rank-item:nth-child(odd) { background: #fff; }
        .rank-item span:last-child { text-align: right; font-weight: bold; color: var(--red); }
        .rank-item .rank-title { font-size: 11px; color: var(--blue); text-align: center; font-weight: bold; }

        .my-final-rank { 
            background: var(--yellow); 
            padding: 4px; 
            border: 2px solid var(--black); 
            font-weight: bold; 
            text-align: center; 
            margin-bottom: 5px; 
            font-size: 13px; 
        }

        #rank-screen .btn { 
            padding: 6px; 
            font-size: 18px; 
        }

        /* --- Game Interface --- */
        #game-interface { display: none; width: 100%; height: 100%; position: relative; z-index: 500; }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
        .shake-effect { animation: shake 0.3s; }

        #viewport { 
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; overflow: hidden; z-index: 510; 
            background-color: var(--yellow);
            background-image: 
                repeating-linear-gradient(45deg, var(--black) 0px, var(--black) 40px, transparent 40px, transparent 80px),
                radial-gradient(rgba(0,0,0,0.3) 2px, transparent 2px);
            background-size: 113px 113px, 12px 12px;
            filter: url(#comic-ink); 
            pointer-events: none; 
        }

        .image-container { 
            position: relative; 
            aspect-ratio: 16 / 9;
            width: auto; height: auto;
            max-width: 95vw; max-height: 82vh; 
            border: 6px solid var(--white); 
            outline: 4px solid var(--black); 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5); 
            background: #000; 
            pointer-events: auto; 
            z-index: 520;
        }

        #main-img { width: 100%; height: 100%; display: block; object-fit: contain; pointer-events: none; }
        #hazard-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* --- HUD --- */
        .side-bar-left { position: absolute; top: 8px; left: 8px; background: var(--white); border: 2px solid var(--black); border-radius: 5px; display: flex; padding: 4px 10px; gap: 10px; z-index: 800; box-shadow: 3px 3px 0px var(--black); }
        .side-item { font-family: 'Bangers'; font-size: 14px; color: #000; }
        .side-item span { font-size: 16px; color: #000 !important; margin-left: 2px; }

        #timer-container { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 25%; height: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--black); border-radius: 10px; overflow: hidden; z-index: 800; }
        #timer-bar { width: 100%; height: 100%; background: var(--green); transition: width 0.2s linear; }

        .hazard { position: absolute; width: 12vh; height: 12vh; transform: translate(-50%, -50%); z-index: 100; border-radius: 50%; cursor: pointer; }
        .hazard.found { border: 4px solid var(--green) !important; background: rgba(0, 255, 0, 0.3) !important; box-shadow: 0 0 15px var(--green); }
        
        .penalty-text { position: absolute; color: var(--red); font-family: 'Bangers'; font-size: 30px; pointer-events: none; z-index: 3000; text-shadow: 2px 2px 0px var(--black); animation: floatUp 0.8s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }
        
        #rules-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 10px; }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="comic-ink">
            <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" />
        </filter>
    </svg>

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>
    <audio id="snd-miss" src="https://assets.mixkit.co/active_storage/sfx/2021/2021-preview.mp3" preload="auto"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
    <audio id="snd-bgm" src="spy.mp3" loop preload="auto"></audio>

    <div id="sound-toggle" onclick="toggleMute()">ON</div>

    <div id="rotate-warning">
        <div class="phone-icon-anim"></div>
        <h2 id="rot-title">ROTATE TO PLAY</h2>
        <h3 id="rot-sub">กรุณาปรับโทรศัพท์เป็นแนวนอนเพื่อเล่น</h3>
    </div>

    <div id="lang-screen" class="screen active-screen">
        <img src="images/mascot.png" class="main-mascot" alt="Mascot">
        <div class="comic-title">HAZARD HUNTER</div>
        <div class="btn-row" style="width: 100%; max-width: 280px;">
            <div class="btn" onclick="selectLang('th')" style="margin:0; flex:1;">ไทย</div>
            <div class="btn" onclick="selectLang('en')" style="margin:0; flex:1; background:var(--blue);">English</div>
        </div>
    </div>

    <div id="login-screen" class="screen">
        <div class="box">
            <input type="text" id="empName" placeholder="">
            <input type="text" id="empID" placeholder="">
            <div class="btn-row">
                <div class="btn" onclick="startGame()" id="start-btn" style="flex:1">START</div>
                <div class="btn" onclick="showRules()" id="rules-btn" style="flex:1; background:#666;">RULES</div>
            </div>
        </div>
    </div>

    <div id="rules-modal">
        <div class="box">
            <h2 id="rules-title" style="font-family:'Bangers'; color:var(--blue); font-size: 24px; margin:0;">RULES</h2>
            <div id="rules-text" style="font-size: 14px; line-height: 1.3; margin: 8px 0; text-align: left;"></div>
            <div class="btn" onclick="closeRules()" id="rules-ok-btn">ตกลง!</div>
        </div>
    </div>

    <div id="game-interface">
        <div id="timer-container"><div id="timer-bar"></div></div>
        <div class="side-bar-left">
            <div class="side-item"><span id="hud-lv-txt">LV</span> <span id="current-lv">1</span></div>
            <div class="side-item"><span id="hud-score-txt">SCORE</span> <span id="total-score">0</span></div>
            <div class="side-item"><span id="hud-time-txt">TIME</span> <span id="time-text">60</span>s</div>
        </div>
        
        <div id="viewport"></div>

        <div style="position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 520;">
            <div class="image-container" id="img-box">
                <img id="main-img" src="">
                <div id="hazard-container"></div>
            </div>
        </div>
    </div>

    <div id="game-over-screen" class="screen">
        <div class="box">
            <h2 id="go-msg" style="font-family:'Bangers'; font-size: 28px; margin:0;">SUCCESS!</h2>
            <h1 id="go-score" style="font-size: 45px; margin: 5px 0; line-height: 1;">0</h1>
            <div id="rank-display" style="font-family:'Bangers'; font-size: 18px; color:var(--blue); margin-bottom: 15px;">RANK: -</div>
            
            <div class="btn-row">
                <div class="btn" onclick="location.reload()" id="replay-btn" style="flex:1">HOME</div>
                <div class="btn" onclick="showRanking()" id="rank-btn" style="flex:1; background:var(--blue);">RANKING</div>
            </div>
        </div>
    </div>

    <div id="rank-screen" class="screen">
        <div class="leaderboard-container">
            <div id="rank-header-title" class="rank-header">🏆 TOP 10 HUNTERS</div>
            <div class="rank-item" style="background:var(--blue); color:white; font-weight:bold; border-radius: 5px 5px 0 0;">
                <span id="col-name">NAME</span>
                <span id="col-title" style="text-align:center">TITLE</span>
                <span id="col-score" style="text-align:right">SCORE</span>
            </div>
            <div id="leaderboard-list" class="rank-list">Loading...</div>
            <div id="my-rank-info" class="my-final-rank"></div>
            <div id="back-btn" class="btn" onclick="hideRanking()" style="width:100%">BACK</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCPpxX_v8Oh53FlVflGiiI9RYSAYqjlyMI",
            authDomain: "lcb1-hazard-hunter.firebaseapp.com",
            databaseURL: "https://lcb1-hazard-hunter-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lcb1-hazard-hunter",
            storageBucket: "lcb1-hazard-hunter.firebasestorage.app",
            messagingSenderId: "70289877308",
            appId: "1:70289877308:web:42a689d0fde4a339a29639",
            measurementId: "G-45EC7TZHNB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const translations = {
            th: { 
                pl: "ชื่อ-สกุล", id: "รหัสพนักงาน หากเป็นพนักงานA0ให้ใส่Aนำหน้า", st: "เริ่มเกม", rb: "กติกา", win: "สำเร็จ!", lose: "เวลาหมด!", rank: "ฉายา: ",
                rt: "กติกาการเล่น", 
                rText: "1. ค้นหาจุดอันตราย 4 จุดต่อภาพ (5 ด่าน)<br>2. รับคะแนน + โบนัสเวลา<br>3. จิ้มผิดหัก 10 วินาที<br>4. สะสมคะแนนชิงฉายา 'ปรมาจารย์'",
                ok: "ตกลง!", rotate: "ROTATE TO PLAY", rotSub: "กรุณาปรับโทรศัพท์เป็นแนวนอนเพื่อเล่น", alert: "กรุณากรอกข้อมูลให้ครบ", replay: "หน้าแรก", ranking: "ลำดับคะแนน",
                hud_lv: "ด่าน", hud_score: "คะแนน", hud_time: "เวลา", 
                rank_head: "🏆 10 อันดับนักล่า", col_n: "ชื่อ", col_t: "ฉายา", col_s: "คะแนน", back: "ย้อนกลับ",
                my_rank_txt: "อันดับของคุณ: #",
                ranks: [
                    {m: 5000, t: "ปรมาจารย์ความปลอดภัย 🧘"}, {m: 4500, t: "ผู้เชี่ยวชาญ ✨"}, {m: 3800, t: "มือโปร 🎯"}, {m: 2500, t: "ฝึกหัด 🔰"}, {m: 0, t: "หน้าใหม่ 👷"}
                ]
            },
            en: { 
                pl: "Name", id: "Employee ID", st: "START", rb: "RULES", win: "CLEAR!", lose: "TIMEOUT!", rank: "RANK: ",
                rt: "HOW TO PLAY", 
                rText: "1. Find 4 hazards per image.<br>2. Get base score + time bonus!<br>3. Careful! Wrong tap costs 10s.<br>4. Be a 'Safety Grandmaster'.",
                ok: "OK!", rotate: "ROTATE TO PLAY", rotSub: "Please rotate your screen", alert: "Please fill in all fields", replay: "HOME", ranking: "RANKING",
                hud_lv: "LV", hud_score: "SCORE", hud_time: "TIME",
                rank_head: "🏆 TOP 10 HUNTERS", col_n: "NAME", col_t: "TITLE", col_s: "SCORE", back: "BACK",
                my_rank_txt: "YOUR RANK: #",
                ranks: [
                    {m: 5000, t: "Safety Grandmaster 🧘"}, {m: 4500, t: "Hazard Expert ✨"}, {m: 3800, t: "Hazard Pro 🎯"}, {m: 2500, t: "Trainee 🔰"}, {m: 0, t: "Observer 👷"}
                ]
            }
        };

        const levelsData = [
            { img: "level1.jpg", points: [{t:11, l:67}, {t:69, l:50}, {t:91, l:54}, {t:92, l:39}] },
            { img: "level2.jpg", points: [{t:26, l:14}, {t:71, l:19}, {t:95, l:54}, {t:77, l:86}] },
            { img: "level3.jpg", points: [{t:35, l:87}, {t:62, l:73}, {t:83, l:39}, {t:92, l:85}] },
            { img: "level4.jpg", points: [{t:24, l:81}, {t:60, l:47}, {t:84, l:68}, {t:95, l:38}] },
            { img: "level5.jpg", points: [{t:22, l:67}, {t:68, l:56}, {t:66, l:89}, {t:57, l:95}] }
        ];

        let currentLang = 'th', currentLevel = 0, totalScore = 0, timeLeft = 60, foundInLevel = 0, isPlaying = false, isMuted = false, timerObj;

        // ฟังก์ชันหาฉายาจากคะแนนตามภาษาปัจจุบัน
        function getRankTitle(score) {
            const list = translations[currentLang].ranks;
            return (list.find(r => score >= r.m) || list[list.length - 1]).t;
        }

        function preloadAssets() {
            levelsData.forEach(lvl => { const img = new Image(); img.src = `images/${lvl.img}`; });
        }

        window.toggleMute = () => {
            isMuted = !isMuted; 
            const b = document.getElementById('sound-toggle'); 
            const bgm = document.getElementById('snd-bgm');
            b.innerText = isMuted ? "OFF" : "ON"; 
            b.style.background = isMuted ? "#555" : "var(--red)"; 
            if(isMuted) bgm.pause(); else if(isPlaying) bgm.play().catch(()=>{});
        };

        window.selectLang = (l) => {
            currentLang = l; const t = translations[l]; playSnd('snd-click');
            preloadAssets();
            document.getElementById('empName').placeholder = t.pl;
            document.getElementById('empID').placeholder = t.id;
            document.getElementById('start-btn').innerText = t.st;
            document.getElementById('rules-btn').innerText = t.rb;
            document.getElementById('rules-ok-btn').innerText = t.ok;
            document.getElementById('replay-btn').innerText = t.replay;
            document.getElementById('rank-btn').innerText = t.ranking;
            document.getElementById('back-btn').innerText = t.back;
            document.getElementById('hud-lv-txt').innerText = t.hud_lv;
            document.getElementById('hud-score-txt').innerText = t.hud_score;
            document.getElementById('hud-time-txt').innerText = t.hud_time;
            document.getElementById('rules-title').innerText = t.rt;
            document.getElementById('rules-text').innerHTML = t.rText;
            document.getElementById('rank-header-title').innerText = t.rank_head;
            document.getElementById('col-name').innerText = t.col_n;
            document.getElementById('col-title').innerText = t.col_t;
            document.getElementById('col-score').innerText = t.col_s;
            document.getElementById('rot-title').innerText = translations[l].rotate;
            document.getElementById('rot-sub').innerText = translations[l].rotSub;
            document.getElementById('lang-screen').classList.remove('active-screen');
            document.getElementById('login-screen').classList.add('active-screen');
        };

        window.showRules = () => { playSnd('snd-click'); document.getElementById('rules-modal').style.display = 'flex'; };
        window.closeRules = () => { playSnd('snd-click'); document.getElementById('rules-modal').style.display = 'none'; };

        window.showRanking = () => {
            playSnd('snd-click');
            document.getElementById('rank-screen').classList.add('active-screen');
        };
        window.hideRanking = () => {
            playSnd('snd-click');
            document.getElementById('rank-screen').classList.remove('active-screen');
        };

        window.startGame = () => {
            playSnd('snd-click');
            if(!document.getElementById('empName').value || !document.getElementById('empID').value) {
                alert(translations[currentLang].alert); return;
            }
            const bgm = document.getElementById('snd-bgm'); bgm.volume = 0.4;
            if(!isMuted) bgm.play().catch(()=>{});
            document.getElementById('login-screen').classList.remove('active-screen');
            document.getElementById('game-interface').style.display = 'block';
            loadLevel(0); startGlobalTimer();
        };

        function loadLevel(lvIndex) {
            if(lvIndex >= levelsData.length) return gameOver(true);
            isPlaying = false; currentLevel = lvIndex; foundInLevel = 0; timeLeft = 60;
            document.getElementById('current-lv').innerText = lvIndex + 1;
            document.getElementById('time-text').innerText = timeLeft;
            const container = document.getElementById('hazard-container'); container.innerHTML = '';
            const img = document.getElementById('main-img');
            img.src = `images/${levelsData[lvIndex].img}`;
            img.onload = () => {
                levelsData[lvIndex].points.forEach(p => {
                    const d = document.createElement('div');
                    d.className = 'hazard'; d.style.top = p.t + '%'; d.style.left = p.l + '%';
                    d.onclick = (e) => { e.stopPropagation(); if(!isPlaying || d.classList.contains('found')) return; hitHazard(d); };
                    container.appendChild(d);
                });
                isPlaying = true;
            };
        }

        function hitHazard(el) {
            playSnd('snd-hit');
            el.classList.add('found'); foundInLevel++;
            totalScore += 125 + Math.floor(timeLeft * 2.5); 
            document.getElementById('total-score').innerText = totalScore;
            if(foundInLevel === 4) { isPlaying = false; setTimeout(() => loadLevel(currentLevel + 1), 600); }
        }

        function startGlobalTimer() {
            if (timerObj) clearInterval(timerObj);
            timerObj = setInterval(() => {
                if(isPlaying) {
                    timeLeft -= 1; if(timeLeft < 0) timeLeft = 0;
                    document.getElementById('time-text').innerText = timeLeft;
                    const bar = document.getElementById('timer-bar');
                    bar.style.width = (timeLeft / 60 * 100) + '%';
                    if(timeLeft <= 15 && timeLeft > 0) { 
                        document.getElementById('snd-bgm').playbackRate = 1.4; 
                        bar.style.background = "var(--red)"; 
                    } else { 
                        document.getElementById('snd-bgm').playbackRate = 1.0; 
                        bar.style.background = timeLeft > 30 ? "var(--green)" : "var(--yellow)"; 
                    }
                    if(timeLeft <= 0) gameOver(false);
                }
            }, 1000);
        }

        document.getElementById('img-box').onclick = (e) => {
            if(!isPlaying || e.target.classList.contains('hazard')) return;
            playSnd('snd-miss');
            timeLeft -= 10; if(timeLeft < 0) timeLeft = 0;
            document.getElementById('time-text').innerText = timeLeft;
            document.getElementById('timer-bar').style.width = (timeLeft / 60 * 100) + '%';
            if(window.navigator.vibrate) window.navigator.vibrate(100);
            
            const p = document.createElement('div');
            p.className = 'penalty-text'; p.innerText = '-10s';
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p); setTimeout(() => p.remove(), 800);
            
            const gi = document.getElementById('game-interface'); gi.classList.add('shake-effect');
            setTimeout(() => gi.classList.remove('shake-effect'), 300);
            if(timeLeft <= 0) gameOver(false);
        };

        async function gameOver(win) {
            isPlaying = false; clearInterval(timerObj);
            const bgm = document.getElementById('snd-bgm');
            bgm.pause(); bgm.currentTime = 0; bgm.playbackRate = 1.0;
            if(win) playSnd('snd-win');
            
            document.getElementById('game-interface').style.display = 'none';
            document.getElementById('game-over-screen').classList.add('active-screen');
            
            const t = translations[currentLang];
            document.getElementById('go-msg').innerText = win ? t.win : t.lose;
            document.getElementById('go-score').innerText = totalScore;
            
            // ใช้ฟังก์ชัน getRankTitle คำนวณฉายาสดๆ ตามภาษาที่เลือก
            document.getElementById('rank-display').innerText = t.rank + getRankTitle(totalScore);

            const id = document.getElementById('empID').value;
            const name = document.getElementById('empName').value;
            const userRef = ref(db, 'rankings/' + id);
            
            const snap = await get(userRef);
            if(!snap.exists() || snap.val().score < totalScore) {
                // บันทึกเฉพาะชื่อ ID คะแนน (ไม่บันทึก Rank เป็นตัวหนังสือเพื่อแก้ปัญหาภาษา)
                await set(userRef, { name, empId: id, score: totalScore, time: Date.now() });
            }

            const allSnap = await get(ref(db, 'rankings'));
            const data = allSnap.val();
            if(data) {
                const sorted = Object.values(data).sort((a,b) => b.score - a.score);
                document.getElementById('leaderboard-list').innerHTML = sorted.slice(0,10).map((p,i) => 
                    `<div class="rank-item">
                        <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">#${i+1} ${p.name}</span> 
                        <span class="rank-title">${getRankTitle(p.score)}</span> 
                        <span>${p.score}</span>
                    </div>`
                ).join('');
                const myRank = sorted.findIndex(p => p.empId === id) + 1;
                document.getElementById('my-rank-info').innerText = t.my_rank_txt + `${myRank} / ${sorted.length}`;
            }
        }

        function playSnd(id) { if(!isMuted) { const s = document.getElementById(id); s.currentTime = 0; s.play().catch(()=>{}); } }
    </script>
</body>
</html>
