<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LCB1 HAZARD HUNTER - FINAL COMPLETE</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Itim&display=swap" rel="stylesheet">
    <style>
        :root { --yellow: #ffde03; --blue: #0336ff; --red: #ff0266; --black: #000; --white: #fff; --green: #00e676; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100svh; 
            font-family: 'Itim', cursive; overflow: hidden; position: fixed; 
            background-color: #1a1a1a;
        }

        /* --- Rotate Warning (แก้ไขให้มี 2 ภาษา) --- */
        #rotate-warning { 
            position: fixed; inset: 0; background: var(--blue); color: var(--white); z-index: 200000; 
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
            padding: 20px;
        }
        #rotate-warning .icon { font-size: 80px; margin-bottom: 10px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media screen and (orientation: portrait) { 
            #rotate-warning { display: flex !important; } 
            #game-interface, .screen, #sound-toggle { display: none !important; } 
        }

        /* --- Sound Toggle --- */
        #sound-toggle { position: fixed; bottom: 10px; left: 10px; width: 55px; height: 40px; background: var(--red); color: var(--white); border: 3px solid var(--black); border-radius: 8px; display: flex; justify-content: center; align-items: center; z-index: 9000; cursor: pointer; font-family: 'Bangers'; font-size: 18px; box-shadow: 3px 3px 0px var(--black); outline: 3px solid var(--white); }

        /* --- UI Screens --- */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: var(--yellow); clip-path: polygon(0 0, 100% 1%, 100% 100%, 0 99%); }
        .active-screen { display: flex; }
        
        #lang-screen { justify-content: center; padding-top: 0; }
        .main-mascot { width: 160px; height: auto; margin-bottom: 10px; filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1)); }
        .comic-title { font-family: 'Bangers'; font-size: 8vh; color: var(--blue); text-shadow: 3px 3px 0px #fff, 6px 6px 0px var(--black); margin-bottom: 15px; transform: rotate(-1deg); }
        .box { background: var(--white); padding: 20px; border: 3px solid var(--black); box-shadow: 6px 6px 0px var(--black); width: 85%; max-width: 450px; text-align: center; position: relative; border-radius: 5px; outline: 4px solid var(--white); }

        input { width: 100%; padding: 10px; margin: 8px 0; border: 2.5px solid var(--black); font-family: 'Itim'; font-size: 18px; border-radius: 5px; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; width: 100%; justify-content: center; }
        .btn { display: inline-block; width: 100%; max-width: 200px; background: var(--red); color: var(--white); padding: 12px; font-family: 'Bangers'; font-size: 24px; border: 3px solid var(--black); cursor: pointer; box-shadow: 3px 3px 0px var(--black); text-align: center; border-radius: 5px; text-decoration: none; margin: 10px auto 0 auto; }
        .btn:active { transform: translate(1.5px, 1.5px); box-shadow: 1px 1px 0px var(--black); }

        /* --- Game Interface --- */
        #game-interface { display: none; width: 100%; height: 100%; position: relative; z-index: 500; }
        
        #viewport { 
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; overflow: hidden; z-index: 510; 
            background-color: var(--yellow);
            background-image: 
                repeating-linear-gradient(45deg, var(--black) 0px, var(--black) 40px, transparent 40px, transparent 80px),
                radial-gradient(rgba(0,0,0,0.3) 2px, transparent 2px);
            background-size: 113px 113px, 12px 12px;
            filter: url(#comic-ink); 
            pointer-events: none; 
        }

        .image-container { 
            position: relative; 
            aspect-ratio: 16 / 9;
            width: auto; height: auto;
            max-width: 92vw; max-height: 85vh; 
            border: 10px solid var(--white); 
            outline: 6px solid var(--black); 
            box-shadow: 15px 15px 0px rgba(0,0,0,0.5); 
            background: #000; 
            pointer-events: auto; 
            z-index: 520;
        }

        #main-img { width: 100%; height: 100%; display: block; object-fit: fill; pointer-events: none; }
        #hazard-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* --- HUD --- */
        .side-bar-left { position: absolute; top: 10px; left: 10px; background: var(--white); border: 2.5px solid var(--black); border-radius: 5px; display: flex; padding: 6px 15px; gap: 15px; z-index: 800; box-shadow: 4px 4px 0px var(--black); }
        .side-item { font-family: 'Bangers'; font-size: 16px; color: #000; }
        .side-item span { font-size: 18px; color: #000 !important; margin-left: 2px; }

        #timer-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 30%; height: 16px; background: rgba(0,0,0,0.5); border: 2.5px solid var(--black); border-radius: 10px; overflow: hidden; z-index: 800; }
        #timer-bar { width: 100%; height: 100%; background: var(--green); transition: width 0.2s linear; }

        .hazard { position: absolute; width: 12vh; height: 12vh; transform: translate(-50%, -50%); z-index: 100; border-radius: 50%; cursor: pointer; }
        .hazard.found { border: 5px solid var(--green) !important; background: rgba(0, 255, 0, 0.3) !important; box-shadow: 0 0 20px var(--green); }
        
        .penalty-text { position: absolute; color: var(--red); font-family: 'Bangers'; font-size: 36px; pointer-events: none; z-index: 3000; text-shadow: 2px 2px 0px var(--black); animation: floatUp 0.8s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }
        .shake-effect { animation: shake 0.3s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-4px, 4px); } 50% { transform: translate(4px, -4px); } 75% { transform: translate(-4px, -4px); } }

        /* --- Rules Modal Fixed --- */
        #rules-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="comic-ink">
            <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" />
        </filter>
    </svg>

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>
    <audio id="snd-miss" src="https://assets.mixkit.co/active_storage/sfx/2021/2021-preview.mp3" preload="auto"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
    <audio id="snd-bgm" src="spy.mp3" loop preload="auto"></audio>

    <div id="sound-toggle" onclick="toggleMute()">ON</div>

    <div id="rotate-warning">
        <div class="icon">🔄</div>
        <h2 style="font-family:'Bangers'; font-size: 32px; margin: 0;">ROTATE TO PLAY</h2>
        <h3 style="font-family:'Itim'; font-size: 24px; margin-top: 5px;">กรุณาหมุนหน้าจอเพื่อเล่น</h3>
    </div>

    <div id="lang-screen" class="screen active-screen">
        <img src="images/mascot.png" class="main-mascot" alt="Mascot">
        <div class="comic-title">HAZARD HUNTER</div>
        <div class="btn-row" style="width: 100%; max-width: 320px;">
            <div class="btn" onclick="selectLang('th')" style="margin:0">ไทย</div>
            <div class="btn" onclick="selectLang('en')" style="margin:0; background:var(--blue);">EN</div>
        </div>
    </div>

    <div id="login-screen" class="screen">
        <div class="box">
            <input type="text" id="empName" placeholder="">
            <input type="text" id="empID" placeholder="">
            <div class="btn-row">
                <div class="btn" onclick="startGame()" id="start-btn" style="margin:0">START</div>
                <div class="btn" onclick="showRules()" id="rules-btn" style="margin:0; background:#666;">RULES</div>
            </div>
        </div>
    </div>

    <div id="rules-modal">
        <div class="box">
            <h2 id="rules-title" style="font-family:'Bangers'; color:var(--blue); font-size: 28px; margin:0;">RULES</h2>
            <div id="rules-text" style="font-size: 16px; line-height: 1.4; margin: 10px 0; text-align: left;"></div>
            <div class="btn" onclick="closeRules()" id="rules-ok-btn">ตกลง!</div>
        </div>
    </div>

    <div id="game-interface">
        <div id="timer-container"><div id="timer-bar"></div></div>
        <div class="side-bar-left">
            <div class="side-item"><span id="hud-lv">LV</span> <span id="current-lv">1</span></div>
            <div class="side-item"><span id="hud-score">SCORE</span> <span id="total-score">0</span></div>
            <div class="side-item"><span id="hud-time">TIME</span> <span id="time-text">60</span>s</div>
        </div>
        
        <div id="viewport"></div>

        <div style="position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 520;">
            <div class="image-container" id="img-box">
                <img id="main-img" src="">
                <div id="hazard-container"></div>
            </div>
        </div>
    </div>

    <div id="game-over-screen" class="screen">
        <div class="box">
            <h2 id="go-msg" style="font-family:'Bangers'; font-size: 32px; margin:0;">SUCCESS!</h2>
            <div id="rank-display" style="font-family:'Bangers'; font-size: 20px; color:var(--blue); margin-top: 5px;">RANK: MASTER</div>
            <h1 id="go-score" style="font-size: 50px; margin: 10px 0;">0</h1>
            <div style="width: 100%; text-align: center;">
                <div class="btn" onclick="location.reload()" id="replay-btn">PLAY AGAIN</div>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            th: { 
                pl: "ชื่อพนักงาน", id: "รหัสพนักงาน", st: "เริ่มเกม", rb: "กติกา", win: "สำเร็จ!", lose: "เวลาหมด!", rank: "ฉายา: ",
                rt: "กติกาการเล่น", 
                rText: "1. ค้นหาจุดอันตราย 4 จุดต่อภาพ (มีทั้งหมด 5 ด่าน)<br>2. รับคะแนนพื้นฐานทุกครั้งที่หาเจอ + โบนัสจากเวลาที่เหลือ<br>3. ระวัง! จิ้มผิดหักเวลา 10 วินาที (คะแนนโบนัสจะลดลง)<br>4. สะสมคะแนนเพื่อชิงฉายา 'ปรมาจารย์ความปลอดภัย'",
                ok: "ตกลง!", rotate: "กรุณาหมุนโทรศัพท์", alert: "กรุณากรอกข้อมูลให้ครบถ้วน", replay: "เล่นอีกครั้ง",
                hud_lv: "ด่าน", hud_score: "คะแนน", hud_time: "เวลา",
                ranks: [
                    {m: 5000, t: "ปรมาจารย์ความปลอดภัย 👑"},
                    {m: 4000, t: "ผู้เชี่ยวชาญความปลอดภัย ✨"},
                    {m: 2500, t: "นักล่าอันตรายมือโปร 🔍"},
                    {m: 1200, t: "เจ้าหน้าที่ฝึกหัด 🔰"},
                    {m: 0, t: "ผู้สังเกตการณ์หน้าใหม่ 👣"}
                ]
            },
            en: { 
                pl: "Name", id: "ID", st: "START", rb: "RULES", win: "CLEAR!", lose: "TIMEOUT!", rank: "RANK: ",
                rt: "HOW TO PLAY", 
                rText: "1. Find 4 hazards per image (5 levels total).<br>2. Get base score for each find + time bonus!<br>3. Careful! Wrong tap costs 10s.<br>4. Reach 'Safety Grandmaster' rank.",
                ok: "OK!", rotate: "PLEASE ROTATE PHONE", alert: "Please fill in all fields", replay: "PLAY AGAIN",
                hud_lv: "LV", hud_score: "SCORE", hud_time: "TIME",
                ranks: [
                    {m: 5000, t: "Safety Grandmaster 👑"},
                    {m: 4000, t: "Safety Expert ✨"},
                    {m: 2500, t: "Hazard Pro 🔍"},
                    {m: 1200, t: "Safety Trainee 🔰"},
                    {m: 0, t: "Observer 👣"}
                ]
            }
        };

        const levelsData = [
            { img: "level1.jpg", points: [{t:11, l:67}, {t:69, l:50}, {t:91, l:54}, {t:92, l:39}] },
            { img: "level2.jpg", points: [{t:26, l:14}, {t:71, l:19}, {t:95, l:54}, {t:77, l:86}] },
            { img: "level3.jpg", points: [{t:35, l:87}, {t:62, l:73}, {t:83, l:39}, {t:92, l:85}] },
            { img: "level4.jpg", points: [{t:24, l:81}, {t:60, l:47}, {t:84, l:68}, {t:95, l:38}] },
            { img: "level5.jpg", points: [{t:22, l:67}, {t:68, l:56}, {t:66, l:89}, {t:57, l:95}] }
        ];

        let currentLang = 'th', currentLevel = 0, totalScore = 0, timeLeft = 60, foundInLevel = 0, isPlaying = false, isMuted = false, timerObj;

        function playClick() { if(!isMuted) { const s = document.getElementById('snd-click'); s.currentTime = 0; s.play().catch(()=>{}); } }
        
        function toggleMute() { 
            playClick(); isMuted = !isMuted; 
            const b = document.getElementById('sound-toggle'); const bgm = document.getElementById('snd-bgm');
            b.innerText = isMuted ? "OFF" : "ON"; b.style.background = isMuted ? "#555" : "var(--red)"; 
            if(isMuted) bgm.pause(); else if(isPlaying) bgm.play().catch(()=>{});
        }

        function selectLang(l) {
            currentLang = l; const t = translations[l]; playClick();
            document.getElementById('empName').placeholder = t.pl; document.getElementById('empID').placeholder = t.id;
            document.getElementById('start-btn').innerText = t.st; document.getElementById('rules-btn').innerText = t.rb;
            document.getElementById('rules-title').innerText = t.rt; document.getElementById('rules-text').innerHTML = t.rText;
            document.getElementById('rules-ok-btn').innerText = t.ok;
            document.getElementById('hud-lv').innerText = t.hud_lv; document.getElementById('hud-score').innerText = t.hud_score;
            document.getElementById('hud-time').innerText = t.hud_time; document.getElementById('replay-btn').innerText = t.replay;
            document.getElementById('lang-screen').classList.remove('active-screen'); document.getElementById('login-screen').classList.add('active-screen');
        }

        function showRules() { playClick(); document.getElementById('rules-modal').style.display = 'flex'; }
        function closeRules() { playClick(); document.getElementById('rules-modal').style.display = 'none'; }

        function startGame() {
            playClick();
            if(!document.getElementById('empName').value || !document.getElementById('empID').value) { alert(translations[currentLang].alert); return; }
            const bgm = document.getElementById('snd-bgm'); bgm.volume = 0.4;
            if(!isMuted) bgm.play().catch(()=>{});
            document.getElementById('login-screen').classList.remove('active-screen');
            document.getElementById('game-interface').style.display = 'block';
            loadLevel(0); startGlobalTimer();
        }

        function loadLevel(lvIndex) {
            if(lvIndex >= levelsData.length) return gameOver(true);
            isPlaying = false; currentLevel = lvIndex; foundInLevel = 0; timeLeft = 60;
            document.getElementById('current-lv').innerText = lvIndex + 1;
            document.getElementById('time-text').innerText = timeLeft;
            const container = document.getElementById('hazard-container'); container.innerHTML = '';
            const img = document.getElementById('main-img');
            img.src = `images/${levelsData[lvIndex].img}`;
            img.onload = () => {
                levelsData[lvIndex].points.forEach(p => {
                    const d = document.createElement('div');
                    d.className = 'hazard'; d.style.top = p.t + '%'; d.style.left = p.l + '%';
                    d.onclick = (e) => { e.stopPropagation(); if(!isPlaying || d.classList.contains('found')) return; hitHazard(d); };
                    container.appendChild(d);
                });
                isPlaying = true;
            };
        }

        function hitHazard(el) {
            if(!isMuted) { const s = document.getElementById('snd-hit'); s.currentTime = 0; s.play(); }
            el.classList.add('found'); foundInLevel++;
            totalScore += 125 + Math.floor(timeLeft * 2); 
            document.getElementById('total-score').innerText = totalScore;
            if(foundInLevel === 4) { isPlaying = false; setTimeout(() => loadLevel(currentLevel + 1), 600); }
        }

        function startGlobalTimer() {
            if (timerObj) clearInterval(timerObj);
            const bgm = document.getElementById('snd-bgm');
            timerObj = setInterval(() => {
                if(isPlaying) {
                    timeLeft -= 1; if(timeLeft < 0) timeLeft = 0;
                    document.getElementById('time-text').innerText = timeLeft;
                    const bar = document.getElementById('timer-bar');
                    bar.style.width = (timeLeft / 60 * 100) + '%';
                    if(timeLeft <= 15 && timeLeft > 0) { bgm.playbackRate = 1.4; bar.style.background = "var(--red)"; } 
                    else { bgm.playbackRate = 1.0; bar.style.background = timeLeft > 30 ? "var(--green)" : "var(--yellow)"; }
                    if(timeLeft <= 0) gameOver(false);
                }
            }, 1000);
        }

        document.getElementById('img-box').onclick = (e) => {
            if(!isPlaying || e.target.classList.contains('hazard')) return;
            if(!isMuted) { const s = document.getElementById('snd-miss'); s.currentTime = 0; s.play(); }
            timeLeft -= 10; if(timeLeft < 0) timeLeft = 0;
            document.getElementById('time-text').innerText = timeLeft;
            document.getElementById('timer-bar').style.width = (timeLeft / 60 * 100) + '%';
            if(window.navigator.vibrate) window.navigator.vibrate(100);
            const p = document.createElement('div');
            p.className = 'penalty-text'; p.innerText = '-10s';
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p); setTimeout(() => p.remove(), 800);
            const gi = document.getElementById('game-interface'); gi.classList.add('shake-effect');
            setTimeout(() => gi.classList.remove('shake-effect'), 300);
            if(timeLeft <= 0) gameOver(false);
        };

        function gameOver(win) {
            isPlaying = false; clearInterval(timerObj);
            const bgm = document.getElementById('snd-bgm');
            bgm.pause(); bgm.currentTime = 0; bgm.playbackRate = 1.0;
            if(win && !isMuted) document.getElementById('snd-win').play();
            document.getElementById('game-interface').style.display = 'none';
            document.getElementById('game-over-screen').classList.add('active-screen');
            const t = translations[currentLang];
            document.getElementById('go-msg').innerText = win ? t.win : t.lose;
            document.getElementById('go-score').innerText = totalScore;
            let rank = t.ranks.find(r => totalScore >= r.m);
            document.getElementById('rank-display').innerText = t.rank + (rank ? rank.t : t.ranks[t.ranks.length-1].t);
        }
    </script>
</body>
</html>
