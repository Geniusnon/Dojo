<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LCB1 HAZARD HUNTER - FULL EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Itim&display=swap" rel="stylesheet">
    <style>
        :root { --yellow: #ffde03; --blue: #0336ff; --red: #ff0266; --black: #000; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100svh; 
            background: var(--black); font-family: 'Itim', cursive; 
            overflow: hidden; position: fixed; 
        }

        /* --- Animations --- */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .shake-effect { animation: shake 0.3s !important; }

        /* Animation: Mascot บินวนลูป */
        @keyframes flyAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -15px) rotate(5deg); }
            50% { transform: translate(0, -30px) rotate(0deg); }
            75% { transform: translate(-20px, -15px) rotate(-5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .flying-mascot { animation: flyAround 6s ease-in-out infinite; } /* บินวนลูปถาวร */

        /* --- Rotate Warning (ปรับปรุงภาษาไทย) --- */
        #rotate-warning {
            position: fixed; inset: 0; background: var(--blue); color: white; z-index: 99999;
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        @media screen and (orientation: portrait) { #rotate-warning { display: flex !important; } }

        /* --- UI Screens --- */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: var(--yellow); }
        .active-screen { display: flex; }
        .comic-title { font-family: 'Bangers'; font-size: 7vh; color: var(--blue); text-shadow: 2px 2px 0px #fff, 3px 3px 0px var(--black); margin-bottom: 2vh; }
        
        .box { background: #fff; padding: 20px; border: 4px solid var(--black); box-shadow: 6px 6px 0px var(--black); width: 85%; max-width: 400px; text-align: center; position: relative; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 2px solid var(--black); font-size: 18px; font-family: 'Itim'; outline: none; text-align: center; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 10px; width: 100%; }
        .btn { flex: 1; background: var(--red); color: #fff; padding: 12px; font-family: 'Bangers'; font-size: 20px; border: 3px solid var(--black); cursor: pointer; box-shadow: 3px 3px 0px var(--black); text-align: center; text-decoration: none; }
        .btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px var(--black); }
        .btn-blue { background: var(--blue); }
        .btn-rules { background: #555; }

        /* สไตล์ปุ่ม Sound Toggle (ON/OFF มุมล่างซ้าย) */
        #sound-toggle {
            position: fixed; bottom: 20px; left: 20px; 
            width: 70px; height: 60px;
            background: var(--red); color: white;
            border: 4px solid var(--black); border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            z-index: 9000; cursor: pointer;
            font-family: 'Bangers'; font-size: 26px;
            box-shadow: 4px 4px 0px var(--black);
            transition: 0.1s;
        }
        #sound-toggle:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--black); }

        /* --- Modal กติกา --- */
        #rules-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 8000;
            display: none; justify-content: center; align-items: center;
        }
        .rules-box { background: #fff; width: 85%; max-width: 400px; padding: 20px; border: 4px solid var(--black); box-shadow: 8px 8px 0px var(--black); }

        /* --- Game Interface --- */
        #game-interface { display: none; width: 100%; height: 100%; position: relative; background: var(--black); z-index: 1500; }
        #viewport { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; overflow-x: auto; overflow-y: hidden; z-index: 1510; }
        .image-container { position: relative; height: 100%; display: flex; align-items: center; }
        #main-img { height: 100%; width: auto; object-fit: contain; display: block; }

        .side-bar-left { 
            position: absolute; top: 10px; left: 10px; background: rgba(255, 255, 255, 0.9); 
            border: 3px solid var(--black); border-radius: 10px; display: flex; padding: 8px 15px; gap: 20px; z-index: 1520; 
        }
        .side-item { text-align: center; font-family: 'Bangers'; font-size: 16px; line-height: 1; color: var(--black); }
        .side-item span { display: inline; font-size: 20px; color: var(--blue); margin-left: 5px; }

        #character-area { position: absolute; bottom: 0; right: 0; width: 130px; z-index: 1520; pointer-events: none; }
        .big-char { width: 100%; height: auto; filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.3)); }

        .hazard { position: absolute; width: 16vh; height: 16vh; transform: translate(-50%, -50%); z-index: 100; border-radius: 50%; border: 4px solid transparent; background: rgba(255, 0, 0, 0); }
        .hazard.found { border-color: #00ff00 !important; background: rgba(0, 255, 0, 0.4) !important; }

        .effect-text { position: fixed; font-family: 'Bangers'; font-size: 45px; pointer-events: none; z-index: 9999; text-shadow: 2px 2px 0px #000; animation: fadeUp 0.8s forwards; }
        @keyframes fadeUp { 0% { opacity: 1; transform: translate(-50%, -50%); } 100% { opacity: 0; transform: translate(-50%, -150%); } }

        #loading-overlay { position: fixed; inset: 0; background: var(--yellow); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <audio id="bgm" loop preload="auto">
        <source src="https://assets.mixkit.co/music/preview/mixkit-mystery-suspense-132.mp3" type="audio/mpeg">
    </audio>
    <audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>
    <audio id="snd-miss" src="https://assets.mixkit.co/active_storage/sfx/2021/2021-preview.mp3" preload="auto"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

    <div id="sound-toggle" onclick="toggleMute()">ON</div>

    <div id="rotate-warning">
        <div style="font-size: 60px;">🔄</div>
        <h2 style="font-family:'Bangers'; margin: 10px 0;">LANDSCAPE ONLY</h2>
        <h3 style="font-family:'Itim'; margin: 0;">หมุนหน้าจอเพื่อเล่น</h3>
    </div>

    <div id="loading-overlay"><h2 style="font-family:'Bangers'">LOADING...</h2></div>

    <div id="rules-modal">
        <div class="rules-box">
            <h2 id="rules-title" style="font-family:'Bangers'; color:var(--blue); margin:0;">RULES</h2>
            <p id="rules-desc" style="font-size: 18px; line-height: 1.4;"></p>
            <div class="btn" onclick="closeRules()">OK!</div>
        </div>
    </div>

    <div id="lang-screen" class="screen active-screen">
        <div class="comic-title">HAZARD HUNTER</div>
        
        <div style="position: relative; width: 150px; height: 150px; margin-bottom: 2vh;">
            <img src="images/character.png" alt="Mascot" class="flying-mascot" style="width: 100%; height: auto; filter: drop-shadow(5px 5px 0px rgba(0,0,0,0.2));">
        </div>

        <div class="btn-row" style="width: 280px;">
            <div class="btn" onclick="selectLang('th')">ไทย</div>
            <div class="btn btn-blue" onclick="selectLang('en')">EN</div>
        </div>
    </div>

    <div id="login-screen" class="screen">
        <div class="box">
            <div style="position: absolute; top: -110px; left: 50%; transform: translateX(-50%); width: 120px; z-index: -1;">
                <img src="images/character.png" alt="Mascot" class="flying-mascot" style="width: 100%; height: auto; filter: drop-shadow(5px 5px 0px rgba(0,0,0,0.2));">
            </div>

            <input type="text" id="empName" placeholder="">
            <input type="text" id="empID" placeholder="">
            <div class="btn-row">
                <div class="btn" onclick="startGame()" id="start-btn">START</div>
                <div class="btn btn-rules" onclick="showRules()" id="rules-btn">RULES</div>
            </div>
        </div>
    </div>

    <div id="game-interface">
        <div id="viewport">
            <div class="image-container" id="img-box">
                <img id="main-img" src="">
                <div id="hazard-container"></div>
            </div>
        </div>
        <div class="side-bar-left">
            <div class="side-item">LV<span id="current-lv">1</span></div>
            <div class="side-item"><span id="ui-time">TIME</span><span id="timer" style="color:red">60</span></div>
            <div class="side-item"><span id="ui-score">SCORE</span><span id="total-score">0</span></div>
        </div>
        <div id="character-area"><img src="images/character.png" class="big-char"></div>
    </div>

    <div id="game-over-screen" class="screen">
        <div class="box">
            <h2 id="go-msg" style="margin:0; font-family:'Bangers'; font-size: 35px;"></h2>
            <div id="rank-display" style="font-family:'Bangers'; font-size: 28px; margin-top: 15px;"></div>
            <div id="go-score-label" style="font-size: 20px; color: #666; margin-top: 10px;"></div>
            <h1 id="go-score" style="font-size: 65px; color: var(--blue); font-family: 'Bangers'; margin: 5px 0;">0</h1>
            <div class="btn" onclick="location.reload()" id="home-btn" style="max-width: 180px; margin: 15px auto 0;">HOME</div>
        </div>
    </div>

    <script>
        const translations = {
            th: {
                placeholder: "กรอกชื่อของคุณ", idPlaceholder: "กรอกรหัสพนักงาน", startBtn: "เริ่มภารกิจ", rulesBtn: "กติกา",
                rulesTitle: "วิธีเล่น", rulesDesc: "1. ค้นหาจุดอันตราย 4 จุดในแต่ละภาพ<br>2. จิ้มที่จุดอันตรายเพื่อเก็บคะแนน<br>3. หากจิ้มผิด เวลาจะลดลง 10 วินาที<br>4. คะแนนคิดจากเวลาที่เหลือ x 10",
                timeLabel: "เวลา", scoreLabel: "คะแนน", goSuccess: "ภารกิจสำเร็จ!", goTimeout: "เวลาหมด!",
                totalScoreLabel: "คะแนนรวมจากเวลา", homeBtn: "หน้าแรก", rankTitle: "ฉายา: ",
                ranks: [
                    { min: 1800, text: "ปรมาจารย์ความปลอดภัย 👑", color: "#ffde03" },
                    { min: 1200, text: "นักล่าอันตรายขั้นสูง 🛡️", color: "#0336ff" },
                    { min: 600, text: "นักล่าอันตรายชั้นต้น 🏹", color: "#ff0266" },
                    { min: 0, text: "นักล่าอันตรายฝึกหัด 🔍", color: "#666" }
                ],
                alertLogin: "กรุณากรอกชื่อและรหัสพนักงาน"
            },
            en: {
                placeholder: "Enter Your Name", idPlaceholder: "Enter Employee ID", startBtn: "START MISSION", rulesBtn: "RULES",
                rulesTitle: "HOW TO PLAY", rulesDesc: "1. Find 4 hazards per level.<br>2. Tap hazards to score.<br>3. Wrong tap reduces 10s time.<br>4. Score = Remaining Time x 10",
                timeLabel: "TIME", scoreLabel: "SCORE", goSuccess: "MISSION CLEAR!", goTimeout: "TIME OUT!",
                totalScoreLabel: "TOTAL TIME SCORE", homeBtn: "HOME", rankTitle: "RANK: ",
                ranks: [
                    { min: 1800, text: "Safety Master 👑", color: "#ffde03" },
                    { min: 1200, text: "Elite Hazard Hunter 🛡️", color: "#0336ff" },
                    { min: 600, text: "Junior Hazard Hunter 🏹", color: "#ff0266" },
                    { min: 0, text: "Trainee Hunter 🔍", color: "#666" }
                ],
                alertLogin: "Please enter your name and ID"
            }
        };

        const levelsData = [
            { img: "level1.jpg", points: [{t:89, l:38}, {t:88, l:53}, {t:17, l:65}, {t:66, l:50}] },
            { img: "level2.jpg", points: [{t:84, l:54}, {t:94, l:36}, {t:53, l:27}, {t:90, l:74}] },
            { img: "level3.jpg", points: [{t:36, l:83}, {t:62, l:69}, {t:89, l:79}, {t:81, l:36}] },
            { img: "level4.jpg", points: [{t:43, l:33}, {t:68, l:73}, {t:47, l:47}, {t:66, l:44}] },
            { img: "level5.jpg", points: [{t:73, l:96}, {t:54, l:55}, {t:37, l:55}, {t:59, l:99}] }
        ];

        let currentLang = 'th', currentLevel = 1, totalScore = 0, timeLeft = 60, foundInLevel = 0, timerObj, isPlaying = false, isMuted = false;
        const bgm = document.getElementById('bgm');

        function selectLang(l) { 
            currentLang = l; 
            const t = translations[currentLang];
            document.getElementById('empName').placeholder = t.placeholder;
            document.getElementById('empID').placeholder = t.idPlaceholder;
            document.getElementById('start-btn').innerText = t.startBtn;
            document.getElementById('rules-btn').innerText = t.rulesBtn;
            document.getElementById('ui-time').innerText = t.timeLabel;
            document.getElementById('ui-score').innerText = t.scoreLabel;
            document.getElementById('rules-title').innerText = t.rulesTitle;
            document.getElementById('rules-desc').innerHTML = t.rulesText;

            // เริ่มเล่น BGM ( Browser จะบล็อกถ้าไม่มีการคลิก )
            bgm.volume = 0.3;
            bgm.play().catch(() => {
                // ถ้าเล่นไม่ได้ ให้รอจิ้มหน้าจออีกครั้ง
                document.addEventListener('click', () => { bgm.play(); }, { once: true });
            });

            document.getElementById('lang-screen').classList.remove('active-screen'); 
            document.getElementById('login-screen').classList.add('active-screen'); 
        }

        function showRules() { document.getElementById('rules-modal').style.display = 'flex'; }
        function closeRules() { document.getElementById('rules-modal').style.display = 'none'; }

        function toggleMute() {
            isMuted = !isMuted;
            bgm.muted = isMuted;
            document.getElementById('snd-hit').muted = isMuted;
            document.getElementById('snd-miss').muted = isMuted;
            document.getElementById('snd-win').muted = isMuted;
            const btn = document.getElementById('sound-toggle');
            btn.innerText = isMuted ? "OFF" : "ON";
            btn.style.background = isMuted ? "#555" : "var(--red)";
            if (!isMuted) bgm.play();
        }

        function startGame() {
            if(!document.getElementById('empName').value || !document.getElementById('empID').value) 
                return alert(translations[currentLang].alertLogin);
            
            document.getElementById('login-screen').classList.remove('active-screen');
            document.getElementById('game-interface').style.display = 'block';
            loadLevel(1); startTimer();
        }

        function playSound(id) {
            const s = document.getElementById(id);
            if(s && !isMuted) { s.currentTime = 0; s.play().catch(()=>{}); }
        }

        function loadLevel(lv) {
            isPlaying = false;
            document.getElementById('loading-overlay').style.display = 'flex';
            const container = document.getElementById('hazard-container');
            container.innerHTML = '';
            const img = document.getElementById('main-img');
            img.src = `images/${levelsData[lv-1].img}?v=${Date.now()}`;
            img.onload = () => {
                document.getElementById('img-box').style.width = img.clientWidth + "px";
                createHazards(lv);
                document.getElementById('loading-overlay').style.display = 'none';
                isPlaying = true; foundInLevel = 0; currentLevel = lv;
                document.getElementById('current-lv').innerText = lv;
                document.getElementById('viewport').scrollLeft = 0;
            };
        }

        function createHazards(lv) {
            const container = document.getElementById('hazard-container');
            levelsData[lv-1].points.forEach(p => {
                const div = document.createElement('div');
                div.className = 'hazard';
                div.style.top = p.t + '%'; div.style.left = p.l + '%';
                div.onclick = (e) => { e.stopPropagation(); handleHit(div); };
                container.appendChild(div);
            });
        }

        function handleHit(div) {
            if(!isPlaying || div.classList.contains('found')) return;
            playSound('snd-hit');
            div.classList.add('found'); foundInLevel++;
            if(foundInLevel === 4) {
                totalScore += (timeLeft * 10);
                document.getElementById('total-score').innerText = totalScore;
                if(currentLevel < levelsData.length) { 
                    setTimeout(() => { timeLeft = 60; loadLevel(currentLevel + 1); }, 600); 
                } else { gameOver(true); }
            }
        }

        document.getElementById('viewport').onclick = (e) => {
            if(!isPlaying || e.target.classList.contains('hazard')) return;
            playSound('snd-miss');
            timeLeft -= 10; if(timeLeft < 0) timeLeft = 0;
            document.getElementById('timer').innerText = timeLeft;
            const gi = document.getElementById('game-interface');
            gi.classList.add('shake-effect');
            setTimeout(() => gi.classList.remove('shake-effect'), 300);
            showEffect("-10s", e.clientX, e.clientY, "#ff0000");
            if(timeLeft <= 0) gameOver(false);
        };

        function showEffect(txt, x, y, color) {
            const p = document.createElement('div');
            p.className = 'effect-text'; p.innerText = txt;
            p.style.left = x + 'px'; p.style.top = y + 'px'; p.style.color = color;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }

        function startTimer() {
            if(timerObj) clearInterval(timerObj);
            timerObj = setInterval(() => { if(isPlaying) { timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft <= 0) gameOver(false); } }, 1000);
        }

        function gameOver(win) {
            isPlaying = false; clearInterval(timerObj);
            if(win) playSound('snd-win');
            const t = translations[currentLang];
            document.getElementById('game-interface').style.display = 'none';
            document.getElementById('game-over-screen').classList.add('active-screen');
            document.getElementById('go-msg').innerText = win ? t.goSuccess : t.goTimeout;
            document.getElementById('go-score').innerText = totalScore;
            document.getElementById('go-score-label').innerText = t.totalScoreLabel;
            document.getElementById('home-btn').innerText = t.homeBtn;
            let finalRank = t.ranks[3];
            for (let r of t.ranks) { if (totalScore >= r.min) { finalRank = r; break; } }
            const rd = document.getElementById('rank-display');
            rd.innerText = t.rankTitle + finalRank.text; rd.style.color = finalRank.color;
        }
    </script>
</body>
</html>
